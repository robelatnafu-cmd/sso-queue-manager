const GDRIVE_CLIENT_ID = "154702253821-g2undfcl7cq72e3sj8d9r0ikssr4a1q0.apps.googleusercontent.com";
const GDRIVE_SCOPES    = "https://www.googleapis.com/auth/drive.file";
const GDRIVE_FILE_NAME = "SSO_Queue_Data.json";
const GDRIVE_MIME      = "application/json";

let _gToken = null;
let _gTokenExpiry = 0;

function gTokenValid() {
  return _gToken && Date.now() < _gTokenExpiry - 30000;
}

function loadGIS() {
  return new Promise((resolve) => {
    if (window.google?.accounts?.oauth2) { resolve(); return; }
    const iv = setInterval(() => {
      if (window.google?.accounts?.oauth2) { clearInterval(iv); resolve(); }
    }, 100);
    setTimeout(() => { clearInterval(iv); resolve(); }, 10000);
  });
}

function gAuthorize(silent = false) {
  return new Promise(async (resolve, reject) => {
    try { await loadGIS(); } catch(e) { reject(new Error("Failed to load Google auth library: " + e.message)); return; }
    if (!window.google?.accounts?.oauth2) { reject(new Error("Google Identity Services not available")); return; }

    let settled = false;
    const timeout = setTimeout(() => {
      if (!settled) { settled = true; reject(new Error("Auth timed out — popup may be blocked. Allow popups for claude.ai and try again.")); }
    }, silent ? 10000 : 60000);

    try {
      const client = window.google.accounts.oauth2.initTokenClient({
        client_id: GDRIVE_CLIENT_ID,
        scope:     GDRIVE_SCOPES,
        error_callback: (err) => {
          if (settled) return;
          settled = true; clearTimeout(timeout);
          reject(new Error(err?.message || err?.type || "OAuth error — check Google Cloud consent screen setup"));
        },
        callback: (resp) => {
          if (settled) return;
          settled = true; clearTimeout(timeout);
          if (resp.error) { reject(new Error(resp.error_description || resp.error)); return; }
          _gToken = resp.access_token;
          _gTokenExpiry = Date.now() + (resp.expires_in || 3600) * 1000;
          resolve(_gToken);
        },
      });
      client.requestAccessToken({ prompt: silent ? "" : "select_account" });
    } catch (e) {
      if (!settled) { settled = true; clearTimeout(timeout); reject(e); }
    }
  });
}

async function gFindFile(token) {
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name%3D'${GDRIVE_FILE_NAME}'+and+trashed%3Dfalse&fields=files(id,name,modifiedTime)&spaces=drive`,
    { headers: { Authorization: "Bearer " + token } }
  );
  const d = await r.json();
  return d.files?.[0] || null;
}

async function gLoad(token) {
  const file = await gFindFile(token);
  if (!file) return null;
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,
    { headers: { Authorization: "Bearer " + token } }
  );
  if (!r.ok) return null;
  return await r.json();
}

async function gSave(token, data) {
  const file   = await gFindFile(token);
  const body   = JSON.stringify(data);
  const metaJ  = JSON.stringify({ name: GDRIVE_FILE_NAME, mimeType: GDRIVE_MIME });
  const blob   = new Blob([
    "--bound\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n" + metaJ +
    "\r\n--bound\r\nContent-Type: " + GDRIVE_MIME + "\r\n\r\n" + body + "\r\n--bound--"
  ], { type: "multipart/related; boundary=bound" });
  const url    = file
    ? `https://www.googleapis.com/upload/drive/v3/files/${file.id}?uploadType=multipart`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
  const r = await fetch(url, {
    method:  file ? "PATCH" : "POST",
    headers: { Authorization: "Bearer " + token },
    body:    blob,
  });
  if (!r.ok) throw new Error("Drive save failed: " + r.status);
  return await r.json();
}

// ── FIX 3: Handle AM/PM timestamps and parenthetical role suffixes
// Old format: "03/06 06:52 - Heidi Sarge: ..."
// New format: "04/13/2026 11:07:49 AM - Jimmy Nguyen (Work notes): ..."
function lastCommentAuthor(comments) {
  if (!comments?.trim()) return "";
  const lines = comments.trim().split("\n").filter(l => l.trim());
  for (let i = lines.length - 1; i >= 0; i--) {
    // Handles both formats:
    //   Old: "03/09 07:20 - Heidi Sarge: message..."
    //   New: "04/13/2026 11:07:49 AM - Jimmy Nguyen (Work notes)"  ← no colon, role in parens
    const m = lines[i].match(/^[\d/]+ [\d:]+(?:\s*[AP]M)? - (.+?)(?:\s*\([^)]*\))?(?::|$)/);
    if (m) return m[1].trim();
  }
  return "";
}

function needsResponse(ticket) {
  if (!ticket.comments?.trim()) return false;
  const author   = lastCommentAuthor(ticket.comments);
  const aliases  = ASSIGNEE_NAMES[ticket.assignee] || [];
  return author !== "" && !aliases.some(n => author.toLowerCase().includes(n.toLowerCase()));
}

// Returns a short next-action descriptor for use in the ticket list and triage mode
function nextAction(ticket, wf) {
  wf = wf || {};
  if (needsResponse(ticket)) {
    const author = lastCommentAuthor(ticket.comments);
    const age = daysSince(ticket.updated);
    return { label: `Reply to ${author}${age > 3 ? " · " + age + "d ago" : ""}`, color:"#f59e0b", icon:"💬" };
  }
  if (!wf.Initial_Message_Sent) return { label:"Send initial message / request forms", color:"#60a5fa", icon:"📋" };
  if (!wf.login_form || !wf.conf_form) {
    const missing = [!wf.login_form && "Login Form", !wf.conf_form && "Conf. Form"].filter(Boolean).join(" & ");
    return { label:"Waiting for " + missing, color:"#475569", icon:"⏳" };
  }
  if (!wf.security_review) return { label:"Confirm security review status", color:"#60a5fa", icon:"🛡️" };
  if (wf.security_review && !wf.security_review_proof) return { label:"Request proof of security review", color:"#f59e0b", icon:"📎" };
  if (!wf.forms_reviewed) return { label:"Review the Login Request Form", color:"#60a5fa", icon:"🔍" };
  if (!wf.steward_sent) return { label:"Send Data Steward approval email", color:"#60a5fa", icon:"📨" };
  if (!wf.steward_approved) return { label:"Waiting for Data Steward approval", color:"#475569", icon:"⏳" };
  if (!wf.handoff_to_gerry) return { label:"Hand off to Gerry for implementation", color:"#a78bfa", icon:"🤝" };
  if (!wf.implemented) return { label:"Waiting for implementation (Gerry)", color:"#475569", icon:"⏳" };
  return { label:"Complete ✓", color:"#10b981", icon:"🚀" };
}

async function readAsBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function docxToText(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = async (e) => {
      try {
        if (typeof mammoth === "undefined") { res(""); return; }
        const out = await mammoth.extractRawText({ arrayBuffer: e.target.result });
        res(out.value || "");
      } catch (err) { rej(err); }
    };
    r.onerror = rej;
    r.readAsArrayBuffer(file);
  });
}

async function claudeCall(messages, system, apiKey) {
  if (!apiKey) throw new Error("NO_API_KEY");
  const body = { model:"claude-sonnet-4-20250514", max_tokens:2500, messages };
  if (system) body.system = system;
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json", "x-api-key": apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body),
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message || "API error");
  return d.content?.map(b => b.text || "").join("") || "";
}

// Apply resolved QA entries to workflow + ssoin fields, return { wf, ssoin, autoAdvanced }
function applyResolvedQA(qaLog, existingWf, existingSsoin) {
  const wf    = { ...existingWf };
  const ssoin = { ...existingSsoin };
  const autoAdvanced = [];

  for (const entry of (qaLog || [])) {
    if (!entry.resolved) continue;
    const text = ((entry.question || "") + " " + (entry.answer || "")).toLowerCase();
    for (const fm of FLAG_MAP) {
      if (fm.patterns.some(p => text.includes(p))) {
        if (!wf[fm.step]) {
          wf[fm.step] = true;
          autoAdvanced.push(fm.label);
        }
        // Also auto-populate ssoin field if applicable
        if (fm.ssoinKey && fm.ssoinVal && !ssoin[fm.ssoinKey]) {
          ssoin[fm.ssoinKey] = fm.ssoinVal(entry.answer || "");
        }
        // Special: if security review resolved, also set proof
        if (fm.key === "security" && entry.answer?.toLowerCase().includes("attach")) {
          wf["security_review_proof"] = true;
        }
        // Special: if forms resolved, set both login_form and conf_form
        if (fm.key === "forms") {
          wf["conf_form"] = true;
        }
      }
    }
  }
  return { wf, ssoin, autoAdvanced };
}

// ── Report generation (Excel via SheetJS) ────────────────────────────────────
function generateReport(tickets, meta, pctFn) {
  if (typeof XLSX === "undefined") { alert("SheetJS not loaded yet — try again in a moment."); return; }

  const wb = XLSX.utils.book_new();

  const argb = hex => "FF" + hex.replace("#","");

  const stepCols = WORKFLOW_STEPS.map(s => s.label);
  const headers  = [
    "Ticket #", "RITM", "Type", "Description", "Assignee", "State",
    "Created", "Last Updated", "Days Since Update",
    ...stepCols,
    "% Complete", "Needs Response", "Last Commenter",
    "Follow-up Date", "Follow-up Overdue",
    "Form Analyzed", "Open Form Issues",
    "Priority", "Notes"
  ];

  const dataRows = tickets.map(t => {
    const m        = meta[t.number] || blankMeta();
    const wf       = m.workflow || {};
    const p        = pctFn(t.number);
    const nr       = needsResponse(t);
    const lastAuth = lastCommentAuthor(t.comments);
    const fuOv     = m.followUp && new Date(m.followUp) <= new Date();
    const formFlags = m.formAnalysis?.flags?.length || 0;

    const stepVals = WORKFLOW_STEPS.map(s => wf[s.id] ? "Yes" : "No");

    return [
      t.number, t.ritm || "", t.type, t.desc, t.assignee, t.state,
      t.created, t.updated, daysSince(t.updated),
      ...stepVals,
      p + "%", nr ? "Yes" : "No", lastAuth || "",
      m.followUp || "", fuOv ? "Yes" : "No",
      m.formAnalysis ? "Yes" : "No", formFlags > 0 ? formFlags + " issue(s)" : "",
      m.priority || "Normal", m.note?.trim() || ""
    ];
  });

  const wsData = [headers, ...dataRows];
  const ws     = XLSX.utils.aoa_to_sheet(wsData);

  const colWidths = [
    14, 12, 12, 50, 10, 12, 11, 11, 8,
    ...WORKFLOW_STEPS.map(() => 14),
    8, 14, 18, 12, 14, 10, 10, 10, 40
  ];
  ws["!cols"] = colWidths.map(w => ({ wch: w }));
  ws["!freeze"] = { xSplit: 0, ySplit: 1 };

  const styleCell = (cellRef, style) => {
    if (!ws[cellRef]) return;
    ws[cellRef].s = style;
  };

  const headerStyle = {
    font:      { bold: true, color: { rgb: "FFFFFFFF" }, name: "Arial", sz: 10 },
    fill:      { patternType: "solid", fgColor: { rgb: argb("#1e3a5f") } },
    alignment: { horizontal: "center", vertical: "center", wrapText: true },
    border: { bottom: { style: "thin", color: { rgb: "FF60a5fa" } } }
  };

  headers.forEach((_, ci) => {
    const ref = XLSX.utils.encode_cell({ r: 0, c: ci });
    styleCell(ref, headerStyle);
  });

  const stepStartCol = 9;
  const stepEndCol   = stepStartCol + WORKFLOW_STEPS.length - 1;

  dataRows.forEach((row, ri) => {
    const rowIdx  = ri + 1;
    const ticket  = tickets[ri];
    const m       = meta[ticket.number] || blankMeta();
    const wf      = m.workflow || {};
    const nr      = needsResponse(ticket);
    const fuOv    = m.followUp && new Date(m.followUp) <= new Date();
    const rowBg   = ri % 2 === 0 ? "FFF0F4FF" : "FFFFFFFF";

    headers.forEach((_, ci) => {
      const ref = XLSX.utils.encode_cell({ r: rowIdx, c: ci });
      if (!ws[ref]) ws[ref] = { t: "z", v: "" };

      let fill  = { patternType: "solid", fgColor: { rgb: rowBg } };
      let font  = { name: "Arial", sz: 10, color: { rgb: "FF1e293b" } };
      let align = { vertical: "center", wrapText: ci === 3 || ci === headers.length - 1 };

      if (ci >= stepStartCol && ci <= stepEndCol) {
        const val = ws[ref].v;
        if (val === "Yes") {
          fill = { patternType: "solid", fgColor: { rgb: "FFd1fae5" } };
          font = { ...font, color: { rgb: "FF065f46" }, bold: true };
        } else {
          fill = { patternType: "solid", fgColor: { rgb: "FFffe4e6" } };
          font = { ...font, color: { rgb: "FF9f1239" }, bold: true };
        }
        align = { ...align, horizontal: "center" };
      }

      if (ci === 5) {
        const stateColors = {
          "Open":        { bg: "FFe0f2fe", fg: "FF0369a1" },
          "Pending":     { bg: "FFfef3c7", fg: "FF92400e" },
          "In Progress": { bg: "FFd1fae5", fg: "FF065f46" },
          "On Hold":     { bg: "FFede9fe", fg: "FF4c1d95" },
        };
        const sc = stateColors[ws[ref].v] || {};
        if (sc.bg) fill = { patternType: "solid", fgColor: { rgb: sc.bg } };
        if (sc.fg) font = { ...font, color: { rgb: sc.fg }, bold: true };
        align = { ...align, horizontal: "center" };
      }

      const nrCol = stepEndCol + 2;
      if (ci === nrCol && ws[ref].v === "Yes") {
        fill = { patternType: "solid", fgColor: { rgb: "FFfef3c7" } };
        font = { ...font, color: { rgb: "FF92400e" }, bold: true };
        align = { ...align, horizontal: "center" };
      }

      const fuCol = stepEndCol + 6;
      if (ci === fuCol && ws[ref].v === "Yes") {
        fill = { patternType: "solid", fgColor: { rgb: "FFffe4e6" } };
        font = { ...font, color: { rgb: "FF9f1239" }, bold: true };
        align = { ...align, horizontal: "center" };
      }

      if (ci === 8 && typeof ws[ref].v === "number" && ws[ref].v > 7) {
        font = { ...font, color: { rgb: "FF9f1239" }, bold: true };
      }

      ws[ref].s = { fill, font, alignment: align,
        border: { bottom: { style: "hair", color: { rgb: "FFe2e8f0" } } }
      };
    });
  });

  XLSX.utils.book_append_sheet(wb, ws, "SSO Queue Report");

  const summary = [
    ["SSO Queue Report"],
    [`Generated: ${new Date().toLocaleString()}`],
    [`Total Tickets: ${tickets.length}`],
    [],
    ["State", "Count"],
    ...["Open","Pending","In Progress","On Hold"].map(s => [s, tickets.filter(t => t.state===s).length]),
    [],
    ["Needs Response", tickets.filter(t => needsResponse(t)).length],
    ["Follow-ups Overdue", tickets.filter(t => { const m = meta[t.number]||blankMeta(); return m.followUp && new Date(m.followUp)<=new Date(); }).length],
    ["Forms Analyzed", tickets.filter(t => (meta[t.number]||blankMeta()).formAnalysis).length],
  ];
  const wsSummary = XLSX.utils.aoa_to_sheet(summary);
  wsSummary["!cols"] = [{ wch: 22 }, { wch: 10 }];
  XLSX.utils.book_append_sheet(wb, wsSummary, "Summary");

  XLSX.writeFile(wb, `SSO_Queue_Report_${new Date().toISOString().slice(0,10)}.xlsx`);
}


// ── Excel diff ───────────────────────────────────────────────────────────────
function parseXlsxTickets(wb) {
  const sheetName = wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { defval:"" });
  return rows.map(r => {
    const number = String(r["Number"] || r["number"] || "").trim();
    return {
      number,
      desc:      String(r["Short description"] || r["short description"] || "").trim(),
      state:     String(r["State"] || r["state"] || "").trim(),
      assignee:  String(r["Assigned to"] || r["assigned to"] || "").trim(),
      updated:   String(r["Updated"] || r["updated"] || r["Updated.1"] || "").trim(),
      comments:  String(r["Comments and Work notes"] || r["Comments and Work notes.1"] || "").trim(),
    };
  }).filter(r => r.number);
}

          { type:"text", text: buildPrompt(sel) }
        ]}];
      } else {
        const text = await docxToText(file);
        if (!text) throw new Error("Could not read DOCX text. Try saving as PDF.");
        messages = [{ role:"user", content:`Form content:\n\n${text}\n\n${buildPrompt(sel)}` }];
      }

      const raw = await claudeCall(messages, ANALYSIS_SYSTEM, apiKey);
      const match = raw.match(/```json\s*([\s\S]*?)```/) || raw.match(/(\{[\s\S]*\})/);
      if (!match) throw new Error("Could not parse AI response. Please try again.");
      const analysis = JSON.parse(match[1]);
      patch(sel.number, { formAnalysis: { ...analysis, fileName: file.name, at: new Date().toISOString() } });
      autoPopulateHandoff(sel.number, analysis);
      setFormBusy(false);
    } catch (err) {
      setFormErr(err.message === "NO_API_KEY"
        ? "No API key set — click the 🔑 Key button in the top bar to add your Anthropic API key."
        : err.message || "Error analyzing form.");
      setFormBusy(false);
    }
  }

  function autoPopulateHandoff(num, analysis) {
    const existing = meta[num]?.ssoin || {};
    const updates = {};
    if (analysis.appName)             updates.application_name             = analysis.appName;
    if (analysis.appDescription)      updates.application_description      = analysis.appDescription;
    if (analysis.supportsSAML==="Yes") updates.authentication_protocol     = "SAML 2.0";
    if (analysis.hasPPID)             updates.application_primary_identifier = "SerialNumber (PPID)";
    if (analysis.accessLimitation)    updates.authorization_method         = analysis.accessLimitation;
    if (analysis.attributes?.length)  updates.attributes_released          = analysis.attributes.join("\n");
    if (analysis.entityId)            updates.entityid                     = analysis.entityId;
    if (analysis.testUrl)             updates.test_url                     = analysis.testUrl;
    if (analysis.hosting)             updates.application_hosting          = analysis.hosting;
    if (analysis.vendor)              updates.vendor                       = analysis.vendor;
    if (analysis.vendorContact)       updates.vendor_contact_name          = analysis.vendorContact;
    if (analysis.vendorEmail)         updates.vendor_contact_email_address = analysis.vendorEmail;
    if (analysis.emoryContact)        updates.application_business_owner_name  = analysis.emoryContact;
    if (analysis.emoryContactNetId)   updates.application_business_owner_netid = analysis.emoryContactNetId;
    if (analysis.supervisorName)      updates.application_technical_owner_name  = analysis.supervisorName;
    if (analysis.supervisorNetId)     updates.application_technical_owner_netid = analysis.supervisorNetId;
    if (Object.keys(updates).length) {
      patch(num, { ssoin: { ...existing, ...updates } });

    if (analysis.emoryContactNetId) updates.application_business_owner_netid = analysis.emoryContactNetId;

  async function handleMetadataUpload(e) {
    const file = e.target.files?.[0];
    if (!file || !sel) return;
    e.target.value = "";
    const isXml = file.name.toLowerCase().endsWith(".xml") || file.type === "text/xml" || file.type === "application/xml";
    if (!isXml) { setFormErr("Please upload an XML metadata file."); return; }

    setMetaBusy(true); setFormErr("");
    try {
      const text = await file.text();
      const entityIdMatch  = text.match(/entityID="([^"]+)"/);
      const acsMatch       = text.match(/AssertionConsumerService[^/]*Location="([^"]+)"/);
      const orgNameMatch   = text.match(/<(?:\w+:)?OrganizationName[^>]*>([^<]+)</);
      const sloMatch       = text.match(/SingleLogoutService[^/]*Location="([^"]+)"/);

      const ssoin = meta[sel.number]?.ssoin || {};
      const updates = {};
      if (entityIdMatch?.[1] && !ssoin.entityid)     updates.entityid    = entityIdMatch[1];
      if (acsMatch?.[1]      && !ssoin.test_url)     updates.test_url    = acsMatch[1];
      if (orgNameMatch?.[1]  && !ssoin.application_name) updates.application_name = orgNameMatch[1];
      if (sloMatch?.[1])                              updates.slo_url     = sloMatch[1];
      updates.metadata_xml  = text;
      updates.metadata_file = file.name;

      patch(sel.number, { ssoin: { ...ssoin, ...updates } });
      setMetaBusy(false);
    } catch (err) {
      setFormErr("Could not parse metadata file: " + err.message);
      setMetaBusy(false);
    }
  }

  // ── Parse pasted text OR comments into Q&A log entries ──────────────────
  async function parseQAText(rawText, responder, sourceLabel) {
    if (!rawText.trim()) return;
    setQaBusy(true); setQaMsg(null);
    try {
      const prompt = `Parse this text containing answers to SSO integration follow-up questions.
Extract each distinct question-answer pair. The responder is: "${responder || "Unknown"}".
Source context: ${sourceLabel}

Text to parse:
---
${rawText}
---

Return ONLY a JSON object in a \`\`\`json block:
{
  "entries": [
    {
      "question": "the question being answered (infer from context if not explicit)",
      "answer": "the full answer text",
      "resolved": true or false (true = question is fully answered and actionable),
      "autoAdvance": ["list of workflow items this resolves: saml | ppid | access | security | steward | forms"],
      "ssoinUpdates": { "field_key": "value" }
    }
  ],
  "summary": "one sentence summary of what was resolved"
}

For autoAdvance, use these keys when the answer clearly resolves that item:
- saml: SAML 2.0 support confirmed
- ppid: Primary identifier confirmed (note if email/other is required instead of PPID)
- access: Authorization/access control method clarified
- security: Security review status addressed (sent, attached, in progress, etc.)
- steward: Data steward has approved attribute release
- forms: Login Request Form and/or Confidentiality Form attached`;

      const raw = await claudeCall([{ role:"user", content:prompt }], QA_SYSTEM, apiKey);
      const match = raw.match(/\`\`\`json\s*([\s\S]*?)\`\`\`/) || raw.match(/(\{[\s\S]*\})/);
      if (!match) throw new Error("Could not parse AI response");
      const parsed = JSON.parse(match[1]);

      const now = new Date().toISOString();
      const newEntries = (parsed.entries || []).map((e, i) => ({
        id: now + "_" + i,
        question:   e.question   || "",
        answer:     e.answer     || "",
        resolved:   e.resolved   ?? true,
        responder:  responder    || "Unknown",
        source:     sourceLabel  || "Pasted text",
        date:       new Date().toLocaleDateString(),
        autoAdvance: e.autoAdvance || [],
      }));

      if (newEntries.length === 0) {
        setQaMsg({ type:"info", text:"No Q&A pairs found in that text.", advanced:[] });
        setQaBusy(false); return;
      }

      // Merge with existing log (avoid duplicates by question similarity)
      const existing = sel.m.qaLog || [];
      const merged = [...existing];
      for (const ne of newEntries) {
        const isDupe = existing.some(e =>
          e.question.toLowerCase().slice(0,40) === ne.question.toLowerCase().slice(0,40)
        );
        if (!isDupe) merged.push(ne);
      }

      // Apply resolved entries to workflow + ssoin
      const currentWf    = sel.m.workflow || {};
      const currentSsoin = sel.m.ssoin    || {};
      const { wf: newWf, ssoin: newSsoin, autoAdvanced } = applyResolvedQA(merged, currentWf, currentSsoin);

      patch(sel.number, { qaLog: merged, workflow: newWf, ssoin: newSsoin });
      setQaPaste("");
      setQaMsg({
        type: "success",
        text: `Parsed ${newEntries.length} response${newEntries.length>1?"s":""}.${parsed.summary ? " " + parsed.summary : ""}`,
        advanced: autoAdvanced,
      });
    } catch(e) {
      setQaMsg({ type:"error", text: e.message === "NO_API_KEY" ? "No API key set — click 🔑 Key in the top bar." : "Parse error: " + e.message, advanced:[] });
    }
    setQaBusy(false);
  }

                <div style={{ background:"#141720", borderRadius:10, border:"1px solid #2a2d3e", padding:18 }}>

                      <h3 style={{ margin:"0 0 6px", color:"#e2e8f0", fontSize:14, fontWeight:600 }}>

                        <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>

                          <span style={{ color:"#475569", fontSize:11, width:52, flexShrink:0 }}>To:</span>

                        </div>

                      <CopyBtn

                          aiDraft.stewardTo ? `To: ${aiDraft.stewardTo}` : "",
                          "",
                          aiDraft.text,

                      />

                  {aiDraft.loading
                    ? <div style={{ textAlign:"center", padding:"44px 0", color:"#475569" }}><div style={{ fontSize:20, marginBottom:7 }}>⟳</div><div style={{ fontSize:11 }}>Generating…</div></div>

                      ? <div style={{ background:"#0f1117", border:"1px solid #2a2d3e", borderRadius:8, padding:15, whiteSpace:"pre-wrap", fontSize:13, lineHeight:1.75, color:"#cbd5e1" }}>{aiDraft.text}</div>
                      : <div style={{ textAlign:"center", padding:"44px 0", color:"#334155" }}><div style={{ fontSize:28, marginBottom:8 }}>✉️</div><div style={{ fontSize:13 }}>Use the Workflow tab buttons to generate a draft</div></div>
                  }
                  {!aiDraft.loading && (
                    <div style={{ marginTop:12, display:"flex", gap:6, flexWrap:"wrap" }}>
                      {[["request_forms","Request Forms"],["steward_approval","Steward Approval"],["status_update","Status Update"],["close_request","Closure"]].map(([type,label]) => (
                        <button key={type} onClick={() => genDraft(type)}
                          style={{ padding:"5px 12px", border:"1px solid #2a2d3e", borderRadius:6, background:aiDraft.type===type?"#1a1e2e":"transparent", color:"#64748b", cursor:"pointer", fontSize:11 }}>
                          {label}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              )}

              {/* RESPONSES */}
              {tab==="responses" && (() => {
                const qaLog = sel.m.qaLog || [];
                const resolved = qaLog.filter(e => e.resolved);
                const pending  = qaLog.filter(e => !e.resolved);
                return (
                <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

                  {/* Auto-parse banner */}
                  {qaMsg && (
                    <div style={{ padding:"10px 14px", borderRadius:8, background:qaMsg.type==="success"?"rgba(16,185,129,.1)":qaMsg.type==="error"?"rgba(239,68,68,.1)":"rgba(96,165,250,.1)", border:`1px solid ${qaMsg.type==="success"?"rgba(16,185,129,.3)":qaMsg.type==="error"?"rgba(239,68,68,.3)":"rgba(96,165,250,.3)"}`, display:"flex", flexDirection:"column", gap:6 }}>
                      <div style={{ fontSize:13, color:qaMsg.type==="success"?"#34d399":qaMsg.type==="error"?"#f87171":"#60a5fa" }}>{qaMsg.type==="success"?"✓":qaMsg.type==="error"?"⚠":"ℹ"} {qaMsg.text}</div>
                      {qaMsg.advanced?.length > 0 && (
                        <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                          {qaMsg.advanced.map((a,i) => (
                            <span key={i} style={{ fontSize:10, padding:"2px 8px", borderRadius:10, background:"rgba(16,185,129,.2)", color:"#34d399", border:"1px solid rgba(16,185,129,.3)" }}>⚡ Auto-advanced: {a}</span>
                          ))}
                        </div>
                      )}
                      <button onClick={() => setQaMsg(null)} style={{ alignSelf:"flex-end", border:"none", background:"none", color:"#475569", cursor:"pointer", fontSize:11 }}>Dismiss</button>
                    </div>

                  {/* Parse from comments button */}
                  <div style={{ background:"#141720", borderRadius:10, border:"1px solid #2a2d3e", padding:16 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                      <h3 style={{ margin:0, color:"#e2e8f0", fontSize:14, fontWeight:600 }}>📬 Response Log</h3>
                      <div style={{ display:"flex", gap:7 }}>
                        <button onClick={parseCommentsForQA} disabled={qaBusy || !sel.comments?.trim()}
                          title={!sel.comments?.trim() ? "No comments in snapshot" : "Scan existing ServiceNow comments for Q&A responses"}
                          style={{ fontSize:11, padding:"5px 12px", border:"1px solid #60a5fa44", borderRadius:6, background:"rgba(96,165,250,.08)", color:(!sel.comments?.trim())?"#334155":"#60a5fa", cursor:(!sel.comments?.trim())?"not-allowed":"pointer", opacity:(!sel.comments?.trim())?0.5:1 }}>
                          {qaBusy ? "⟳ Parsing…" : "🔍 Scan comments"}
                        </button>
                        {qaLog.length > 0 && (
                          <button onClick={() => { if(window.confirm("Clear all Q&A log entries for this ticket?")) patch(sel.number, { qaLog:[] }); }}
                            style={{ fontSize:11, padding:"5px 10px", border:"1px solid #f8717144", borderRadius:6, background:"rgba(239,68,68,.06)", color:"#f87171", cursor:"pointer" }}>
                            Clear all
                          </button>
                        )}
                      </div>
                    </div>

                    {qaLog.length === 0 ? (
                      <div style={{ textAlign:"center", padding:"24px 0", color:"#334155" }}>

                        <div style={{ fontSize:11, color:"#2a3448", marginTop:4 }}>Scan comments or paste a response below.</div>
                      </div>

                      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                        {qaLog.map((entry, i) => (
                          <div key={entry.id || i} style={{ background:"#0f1117", border:`1px solid ${entry.resolved?"rgba(16,185,129,.25)":"rgba(245,158,11,.25)"}`, borderRadius:8, padding:12 }}>
                            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6, gap:8 }}>
                              <div style={{ flex:1 }}>
                                <div style={{ fontSize:12, color:"#94a3b8", fontWeight:600, marginBottom:3 }}>Q: {entry.question}</div>
                                <div style={{ fontSize:13, color:"#e2e8f0", lineHeight:1.5 }}>A: {entry.answer}</div>
                              </div>
                              <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4, flexShrink:0 }}>
                                <span style={{ fontSize:9, padding:"2px 7px", borderRadius:10, background:entry.resolved?"rgba(16,185,129,.2)":"rgba(245,158,11,.2)", color:entry.resolved?"#34d399":"#fbbf24", border:`1px solid ${entry.resolved?"rgba(16,185,129,.3)":"rgba(245,158,11,.3)"}`, fontWeight:700 }}>
                                  {entry.resolved ? "✓ RESOLVED" : "⏳ PENDING"}
                                </span>
                                <button onClick={() => {
                                  const updated = qaLog.map((e,j) => j===i ? {...e, resolved:!e.resolved} : e);
                                  const {wf: newWf, ssoin: newSsoin, autoAdvanced} = applyResolvedQA(updated, sel.m.workflow||{}, sel.m.ssoin||{});
                                  patch(sel.number, { qaLog:updated, workflow:newWf, ssoin:newSsoin });
                                  if (autoAdvanced.length) setQaMsg({ type:"success", text:"Workflow updated.", advanced:autoAdvanced });
                                }} style={{ fontSize:9, padding:"2px 7px", border:"1px solid #2a2d3e", borderRadius:4, background:"transparent", color:"#475569", cursor:"pointer" }}>
                                  Toggle
                                </button>
                              </div>
                            </div>
                            <div style={{ display:"flex", gap:10, fontSize:10, color:"#334155", flexWrap:"wrap" }}>
                              <span>👤 {entry.responder}</span>
                              <span>📅 {entry.date}</span>
                              <span>📥 {entry.source}</span>
                            </div>
                            {/* Edit fields inline */}
                            <div style={{ marginTop:8, display:"flex", gap:6 }}>
                              <input value={entry.responder} onChange={e => {
                                const updated = qaLog.map((en,j) => j===i ? {...en, responder:e.target.value} : en);
                                patch(sel.number, { qaLog:updated });
                              }} placeholder="Responder name" style={{ flex:1, background:"#141720", border:"1px solid #2a2d3e", borderRadius:5, padding:"4px 8px", color:"#94a3b8", fontSize:11, outline:"none" }} />
                              <button onClick={() => {
                                const updated = qaLog.filter((_,j) => j !== i);
                                patch(sel.number, { qaLog:updated });
                              }} style={{ fontSize:10, padding:"4px 8px", border:"1px solid #f8717133", borderRadius:5, background:"transparent", color:"#f87171", cursor:"pointer" }}>Remove</button>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* Paste new response */}
                  <div style={{ background:"#141720", borderRadius:10, border:"1px solid #2563eb33", padding:16 }}>
                    <h3 style={{ margin:"0 0 10px", color:"#e2e8f0", fontSize:14, fontWeight:600 }}>✏️ Paste Email / Message Response</h3>
                    <div style={{ marginBottom:8 }}>
                      <div style={{ fontSize:11, color:"#475569", marginBottom:4 }}>Responder name</div>
                      <input value={qaResponder} onChange={e => setQaResponder(e.target.value)}
                        placeholder="e.g. Jimmy Nguyen (DigitalPulp) or Dalong Wang"
                        style={{ width:"100%", background:"#0f1117", border:"1px solid #2a2d3e", borderRadius:6, padding:"7px 10px", color:"#e2e8f0", fontSize:12, outline:"none" }} />
                    </div>
                    <div style={{ marginBottom:10 }}>
                      <div style={{ fontSize:11, color:"#475569", marginBottom:4 }}>Paste response text</div>
                      <textarea value={qaPaste} onChange={e => setQaPaste(e.target.value)}
                        placeholder={"Paste the email body or message here...\n\nExamples:\n• SAML 2.0 is supported.\n• Email is required, we cannot use PPID.\n• Security review form has been attached.\n• Approved. — Peter Buch"}
                        style={{ width:"100%", minHeight:140, background:"#0f1117", border:"1px solid #2a2d3e", borderRadius:7, padding:"10px 12px", color:"#cbd5e1", fontSize:13, lineHeight:1.65, resize:"vertical", outline:"none" }} />
                    </div>
                    <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                      <button onClick={() => parseQAText(qaPaste, qaResponder, "Pasted email/message")}
                        disabled={qaBusy || !qaPaste.trim()}
                        style={{ padding:"8px 18px", border:"1px solid #60a5fa55", borderRadius:7, background:"rgba(96,165,250,.1)", color:qaPaste.trim()?"#60a5fa":"#334155", cursor:qaPaste.trim()?"pointer":"not-allowed", fontSize:13, fontWeight:600 }}>
                        {qaBusy ? "⟳ Parsing…" : "Parse & Log Response"}
                      </button>

                      <span style={{ fontSize:10, color:"#334155", marginLeft:"auto" }}>Claude will extract Q&A pairs and auto-advance workflow</span>
                    </div>
                  </div>

                  {/* Summary of what's resolved vs pending */}
                  {qaLog.length > 0 && (
                    <div style={{ background:"#141720", borderRadius:10, border:"1px solid #2a2d3e", padding:14, display:"flex", gap:14 }}>
                      <div style={{ flex:1, textAlign:"center" }}>
                        <div style={{ fontSize:22, fontWeight:700, color:"#34d399" }}>{resolved.length}</div>
                        <div style={{ fontSize:10, color:"#34d399", fontFamily:"monospace" }}>RESOLVED</div>
                      </div>
                      <div style={{ width:1, background:"#2a2d3e" }} />
                      <div style={{ flex:1, textAlign:"center" }}>
                        <div style={{ fontSize:22, fontWeight:700, color:"#fbbf24" }}>{pending.length}</div>
                        <div style={{ fontSize:10, color:"#fbbf24", fontFamily:"monospace" }}>PENDING</div>
                      </div>
                      <div style={{ width:1, background:"#2a2d3e" }} />
                      <div style={{ flex:1, textAlign:"center" }}>
                        <div style={{ fontSize:22, fontWeight:700, color:"#60a5fa" }}>{qaLog.length}</div>
                        <div style={{ fontSize:10, color:"#60a5fa", fontFamily:"monospace" }}>TOTAL</div>
                      </div>
                    </div>
                  )}
                </div>
                );
              })()}

              {/* NOTES */}
              {tab==="notes" && (
                <div style={{ background:"#141720", borderRadius:10, border:"1px solid #2a2d3e", padding:18 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                    <h3 style={{ margin:0, color:"#e2e8f0", fontSize:14, fontWeight:600 }}>📝 Internal Notes</h3>
                    <span style={{ color:"#334155", fontSize:10 }}>Auto-saved</span>
                  </div>
                  <textarea value={sel.m.note} onChange={e => patch(sel.number,{note:e.target.value})}
                    placeholder="Track open questions, decisions, blockers, next steps…"
                    style={{ width:"100%", minHeight:360, background:"#0f1117", border:"1px solid #2a2d3e", borderRadius:8, padding:13, color:"#cbd5e1", fontSize:14, lineHeight:1.7, resize:"vertical", outline:"none" }} />
                </div>
              )}

              {/* COMMENTS */}
              {tab==="comments" && (() => {
                const na = nextAction(sel, sel.m.workflow);
                return (
                <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                  {/* Next action banner */}
                  <div style={{ background:"#141720", borderRadius:10, border:`1px solid ${na.color}33`, padding:"12px 16px", display:"flex", alignItems:"center", gap:10 }}>
                    <span style={{ fontSize:18 }}>{na.icon}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:11, color:"#475569", marginBottom:2 }}>NEXT ACTION</div>
                      <div style={{ fontSize:13, color:na.color, fontWeight:600 }}>{na.label}</div>
                    </div>
                    {triageMode && (() => {
                      const idx = visible.findIndex(t => t.number === sel.number);
                      const next = visible[idx + 1];
                      return next ? (
                        <button onClick={() => { setSelected(next); }}
                          style={{ fontSize:11, padding:"5px 12px", border:"1px solid #f59e0b55", borderRadius:6, background:"rgba(245,158,11,.1)", color:"#f59e0b", cursor:"pointer", whiteSpace:"nowrap" }}>
                          Next ticket →
                        </button>
                      ) : (
                        <span style={{ fontSize:11, color:"#10b981" }}>✓ Last ticket in triage</span>
                      );
                    })()}
                  </div>

                  {/* Comment composer */}
                  <div style={{ background:"#141720", borderRadius:10, border:"1px solid #2a2d3e", padding:16 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                      <h3 style={{ margin:0, color:"#e2e8f0", fontSize:14, fontWeight:600 }}>✏️ Draft Comment</h3>
                      <div style={{ display:"flex", gap:6 }}>
                        {aiDraft.text && aiDraft.type === "status_update" && (
                          <button onClick={() => {
                            patch(sel.number, { note: (sel.m.note ? sel.m.note + "\n\n" : "") + "--- Draft comment copied ---\n" + aiDraft.text });
                          }} style={{ fontSize:10, padding:"3px 8px", border:"1px solid #2a2d3e", borderRadius:4, background:"transparent", color:"#475569", cursor:"pointer" }}>Save to notes</button>
                        )}
                        <a href={snowUrl(sel.number)} target="_blank" rel="noreferrer" style={{ fontSize:11, color:"#60a5fa", textDecoration:"none" }}>Open in ServiceNow ↗</a>
                      </div>
                    </div>
                    <textarea
                      value={sel.m.commentDraft || ""}
                      onChange={e => patch(sel.number, { commentDraft: e.target.value })}
                      placeholder={"Draft your ServiceNow comment here…\n\nTip: Use the Drafts tab to AI-generate a full email, then paste the body here."}
                      style={{ width:"100%", minHeight:120, background:"#0f1117", border:"1px solid #2a2d3e", borderRadius:7, padding:"10px 12px", color:"#cbd5e1", fontSize:13, lineHeight:1.65, resize:"vertical", outline:"none", marginBottom:8 }}
                    />
                    <div style={{ display:"flex", gap:7, alignItems:"center" }}>
                      <button onClick={() => doCopy(sel.m.commentDraft || "", "comment_draft")}
                        style={{ padding:"6px 14px", background:copied==="comment_draft"?"#10b981":"#1e3a5f", border:`1px solid ${copied==="comment_draft"?"#10b981":"#2563eb55"}`, borderRadius:6, color:copied==="comment_draft"?"white":"#60a5fa", cursor:"pointer", fontSize:12, fontWeight:600, transition:"all .2s" }}>
                        {copied==="comment_draft" ? "✓ Copied" : "Copy to clipboard"}
                      </button>
                      <button onClick={() => patch(sel.number, { commentDraft: "" })}
                        style={{ padding:"6px 10px", border:"1px solid #2a2d3e", borderRadius:6, background:"transparent", color:"#475569", cursor:"pointer", fontSize:11 }}>
                        Clear
                      </button>
                      <span style={{ fontSize:10, color:"#334155", marginLeft:"auto" }}>Paste into the ServiceNow "Additional comments" field</span>
                    </div>
                  </div>

                  {/* Snapshot of comments from export */}
                  <div style={{ background:"#141720", borderRadius:10, border:"1px solid #2a2d3e", padding:16 }}>
                    <h3 style={{ margin:"0 0 10px", color:"#e2e8f0", fontSize:14, fontWeight:600 }}>💬 Comment Snapshot</h3>
                    {sel.comments
                      ? <div style={{ whiteSpace:"pre-wrap", fontSize:13, lineHeight:1.8, color:"#94a3b8", background:"#0f1117", border:"1px solid #2a2d3e", borderRadius:8, padding:13 }}>{sel.comments}</div>
                      : <div style={{ textAlign:"center", padding:"34px 0", color:"#334155" }}>
                          <div style={{ fontSize:22, marginBottom:7 }}>💬</div>
                          <div style={{ fontSize:13 }}>No comments in this snapshot — open in ServiceNow for live activity.</div>
                        </div>
                    }
                  </div>
                </div>
                );
              })()}
            </div>
          </div>
        ) : showReport ? (
          <div style={{ flex:1, overflowY:"auto", padding:"20px 24px", background:"#0f1117" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
              <div>
                <h2 style={{ margin:"0 0 3px", color:"#f1f5f9", fontSize:18, fontWeight:700 }}>📊 Pending Actions Report</h2>
                <div style={{ color:"#475569", fontSize:11, fontFamily:"monospace" }}>{new Date().toLocaleString()} · {tickets.length} tickets</div>
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:20 }}>
              {["Open","Pending","In Progress","On Hold"].map(s => {
                const cnt = tickets.filter(t => t.state===s).length;
                const sm  = STATE_META[s];
                return (
                  <div key={s} style={{ background:"#141720", border:`1px solid ${sm.color}33`, borderRadius:8, padding:"12px 16px", textAlign:"center" }}>
                    <div style={{ fontSize:24, fontWeight:700, color:sm.color }}>{cnt}</div>
                    <div style={{ fontSize:10, color:sm.color, opacity:.7, fontFamily:"monospace" }}>{s.toUpperCase()}</div>
                  </div>
                );
              })}
            </div>
            {tickets.map(t => {
              const m        = meta[t.number] || blankMeta();
              const wf       = m.workflow || {};
              const pending  = WORKFLOW_STEPS.filter(s => !wf[s.id]);
              const done     = WORKFLOW_STEPS.filter(s =>  wf[s.id]);
              const p        = pct(t.number);
              const nr       = needsResponse(t);
              const lastAuth = lastCommentAuthor(t.comments);
              const fuOv     = m.followUp && new Date(m.followUp) <= new Date();
              const formFlags = m.formAnalysis?.flags || [];
              const sm       = STATE_META[t.state] || {};
              return (
                <div key={t.number} style={{ background:"#141720", border:"1px solid #2a2d3e", borderRadius:10, padding:16, marginBottom:12 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", gap:7, alignItems:"center", marginBottom:3, flexWrap:"wrap" }}>
                        <span style={{ fontFamily:"monospace", fontSize:10, color:"#334155" }}>{t.number}</span>
                        {t.ritm && <span style={{ fontFamily:"monospace", fontSize:10, color:"#2a3448" }}>· {t.ritm}</span>}
                        <span style={{ fontSize:10, padding:"1px 7px", borderRadius:10, background:sm.bg, color:sm.color, border:`1px solid ${sm.color}55` }}>{t.state}</span>
                        {nr && <span style={{ fontSize:10, padding:"1px 7px", borderRadius:10, background:"rgba(245,158,11,.15)", color:"#fbbf24", border:"1px solid rgba(245,158,11,.3)" }}>💬 Needs response</span>}
                        {fuOv && <span style={{ fontSize:10, padding:"1px 7px", borderRadius:10, background:"rgba(239,68,68,.15)", color:"#f87171", border:"1px solid rgba(239,68,68,.3)" }}>🔴 Follow-up overdue</span>}
                      </div>
                      <div style={{ color:"#e2e8f0", fontSize:14, fontWeight:600, marginBottom:4 }}>{t.desc}</div>
                      <div style={{ color:"#475569", fontSize:11, fontFamily:"monospace" }}>👤 {t.assignee} · 📅 {t.created} · 🔄 {t.updated}{lastAuth ? ` · ↩ ${lastAuth}` : ""}</div>
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4, flexShrink:0, marginLeft:12 }}>
                      <div style={{ width:80, height:4, background:"#2a2d3e", borderRadius:2 }}>
                        <div style={{ width:`${p}%`, height:"100%", background:p===100?"#10b981":"#60a5fa", borderRadius:2 }} />
                      </div>
                      <span style={{ fontSize:10, color:"#334155", fontFamily:"monospace" }}>{p}% complete</span>
                      <button onClick={() => { setShowReport(false); setSelected(t); }}
                        style={{ fontSize:10, padding:"3px 9px", border:"1px solid #2a2d3e", borderRadius:5, background:"transparent", color:"#60a5fa", cursor:"pointer" }}>
                        Open ↗
                      </button>
                    </div>
                  </div>

                  <div style={{ display:"grid", gridTemplateColumns: pending.length && done.length ? "1fr 1fr" : "1fr", gap:12 }}>
                    {pending.length > 0 && (
                      <div>
                        <div style={{ fontSize:10, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:.6, marginBottom:5 }}>📋 Pending Steps</div>
                        {pending.map(s => (
                          <div key={s.id} style={{ fontSize:12, padding:"4px 0", borderBottom:"1px solid #1a1e2e", color:"#94a3b8" }}>{s.icon} {s.label}</div>
                        ))}
                      </div>
                    )}
                    {done.length > 0 && pending.length > 0 && (
                      <div>
                        <div style={{ fontSize:10, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:.6, marginBottom:5 }}>✓ Completed</div>
                        {done.map(s => (
                          <div key={s.id} style={{ fontSize:12, padding:"4px 0", borderBottom:"1px solid #1a1e2e", color:"#334155", textDecoration:"line-through" }}>✓ {s.label}</div>
                        ))}
                      </div>
                    )}
                    {pending.length === 0 && (
                      <div style={{ color:"#10b981", fontSize:12, fontStyle:"italic" }}>✅ All workflow steps complete</div>
                    )}
                  </div>

                  {formFlags.length > 0 && (
                    <div style={{ marginTop:10 }}>
                      <div style={{ fontSize:10, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:.6, marginBottom:5 }}>⚠ Form Issues</div>
                      {formFlags.map((f,i) => (
                        <div key={i} style={{ fontSize:12, padding:"4px 8px", background:"rgba(239,68,68,.07)", border:"1px solid rgba(239,68,68,.2)", borderRadius:5, color:"#fca5a5", marginBottom:3 }}>{f}</div>
                      ))}
                    </div>
                  )}

                  {m.note?.trim() && (
                    <div style={{ marginTop:10, fontSize:12, background:"#0f1117", border:"1px solid #2a2d3e", borderRadius:6, padding:"8px 10px", color:"#64748b", whiteSpace:"pre-wrap" }}>
                      <span style={{ color:"#334155", fontWeight:700 }}>📝 </span>{m.note.trim()}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ) : (
          <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:"#0f1117", gap:12 }}>
            <div style={{ fontSize:46 }}>🛡️</div>
            <div style={{ fontSize:17, color:"#334155", fontWeight:600 }}>Select a ticket to begin</div>
            <div style={{ fontSize:12, color:"#2a2d3e" }}>{filteredBase.length} active SSO requests · {overdue} follow-ups due</div>
            <div style={{ display:"flex", gap:13, marginTop:10 }}>
              {["Open","Pending","In Progress","On Hold"].map(s => {
                const cnt = filteredBase.filter(t => t.state===s).length;
                const sm  = STATE_META[s];
                return (
                  <div key={s} onClick={() => setStateF(s)} style={{ cursor:"pointer", textAlign:"center", padding:"11px 16px", border:`1px solid ${sm.color}33`, borderRadius:10, background:sm.bg }}>
                    <div style={{ fontSize:22, fontWeight:700, color:sm.color }}>{cnt}</div>
                    <div style={{ fontSize:10, color:sm.color, opacity:.7 }}>{s}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
